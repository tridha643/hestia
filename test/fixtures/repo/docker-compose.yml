name: fixture
services:
  db:
    image: postgres:16-alpine
    container_name: fixture-db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: app
    ports:
      - "54329:5432"
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 2s
      timeout: 3s
      retries: 30
volumes:
  fixture_db_data:
networks:
  fixture-net:
    driver: bridge
