name: release

on:
  workflow_dispatch:
    inputs:
      tag:
        description: npm dist-tag
        required: true
        default: next
        type: choice
        options: [next, latest]

permissions:
  contents: read
  id-token: write

jobs:
  package:
    runs-on: macos-14
    environment: npm-release
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14
      - run: bun install --frozen-lockfile
      - run: bunx tsc --noEmit
      - run: bun test
      - run: bun run build
      - run: npm pack --dry-run
      - id: pack
        run: |
          TARBALL="$(npm pack --json | bun -e 'const x=await Bun.stdin.json(); console.log(x[0].filename)')"
          echo "tarball=$TARBALL" >> "$GITHUB_OUTPUT"
          shasum -a 256 "$TARBALL"
      - run: |
          export BUN_INSTALL="$RUNNER_TEMP/bun-home"
          mkdir -p "$BUN_INSTALL"
          bun add --global "./${{ steps.pack.outputs.tarball }}"
          hestia version --json
          hestia skill path
      - if: inputs.tag == 'next'
        run: npm publish "${{ steps.pack.outputs.tarball }}" --tag next --provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
      - if: inputs.tag == 'latest'
        run: |
          VERSION="$(bun -e 'console.log((await Bun.file("package.json").json()).version)')"
          npm dist-tag add "@tridha643/hestia@$VERSION" latest
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
